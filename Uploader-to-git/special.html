<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>File Viewer</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: system-ui, sans-serif; margin:0; background:#f3f6fa; display:flex; align-items:center; justify-content:center; height:100vh; }
    .viewer { max-width: 90%; max-height: 90%; background:#fff; padding:20px; border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,0.15); display:flex; flex-direction:column; align-items:center; }
    img, iframe, pre { max-width: 100%; max-height: 70vh; margin:10px 0; }
    pre { white-space: pre-wrap; word-break: break-word; background:#f7f7f7; padding:10px; border-radius:6px; overflow:auto; }
    .controls { margin-top:10px; display:flex; gap:10px; }
    button { padding:8px 16px; border:none; border-radius:5px; background:#0078f2; color:white; cursor:pointer; }
    button:hover { background:#005bb5; }
    .filename { margin-bottom: 10px; color:#444; }
  </style>
</head>
<body>
  <div class="viewer">
    <h2 id="title">File Viewer</h2>
    <div id="meta" class="filename"></div>
    <div id="display"></div>
    <div class="controls">
      <button id="prevBtn">⬅ Prev</button>
      <button id="nextBtn">Next ➡</button>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const idsParam = params.get("id");

    // 🔹 Set your Worker base here
    const WORKER_BASE = "https://files.clip-devious-turf.workers.dev";

    if (!idsParam) {
      document.getElementById("meta").textContent = "No file id provided.";
      throw new Error("No id");
    }

    const ids = idsParam.split(",");
    let currentIndex = 0;
    let files = [];

    async function fetchFile(id) {
      const res = await fetch(`${WORKER_BASE}/file/${encodeURIComponent(id)}`);
      if (!res.ok) throw new Error("File not found");

      const ct = res.headers.get("Content-Type") || "application/octet-stream";
      const disp = res.headers.get("Content-Disposition") || "";
      const filenameMatch = disp.match(/filename="?(.*?)"?$/);
      const filename = filenameMatch ? filenameMatch[1] : id;
      const blob = await res.blob();

      return { id, ct, filename, blob };
    }

    async function loadAll() {
      for (const id of ids) {
        try {
          const file = await fetchFile(id);
          files.push(file);
        } catch (e) {
          console.error("Failed to fetch file:", id, e);
        }
      }
      showFile(0);
    }

    function showFile(index) {
      if (files.length === 0) return;
      currentIndex = (index + files.length) % files.length;
      const file = files[currentIndex];

      document.getElementById("meta").textContent = `${file.filename} — ${file.ct}`;
      const dispDiv = document.getElementById("display");
      dispDiv.innerHTML = "";

      if (file.ct.startsWith("image/")) {
        const img = document.createElement("img");
        img.src = URL.createObjectURL(file.blob);
        dispDiv.appendChild(img);
      } else if (file.ct === "application/pdf") {
        const frame = document.createElement("iframe");
        frame.src = URL.createObjectURL(file.blob);
        frame.style.width = "100%";
        frame.style.height = "70vh";
        dispDiv.appendChild(frame);
      } else {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(file.blob);
        a.download = file.filename;
        a.textContent = "Download file";
        dispDiv.appendChild(a);

        // Try previewing text
        file.blob.text().then(txt => {
          const pre = document.createElement("pre");
          pre.textContent = txt.slice(0, 20000);
          dispDiv.appendChild(pre);
        }).catch(() => {});
      }
    }

    document.getElementById("prevBtn").addEventListener("click", () => {
      showFile(currentIndex - 1);
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      showFile(currentIndex + 1);
    });

    loadAll();
  </script>
</body>
</html>
